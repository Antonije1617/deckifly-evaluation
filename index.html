<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deckifly Reading Study</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f7f7f8;
      color: #222;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 700px;
      margin: 80px auto;
      padding: 40px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      text-align: center;
    }

    h1 {
      margin-bottom: 16px;
      font-size: 32px;
    }

    p {
      color: #555;
      line-height: 1.6;
      margin-bottom: 32px;
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    a.button {
      display: block;
      padding: 16px;
      background: #4f46e5;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-size: 18px;
      transition: 0.2s;
    }

    a.button:hover {
      background: #4338ca;
    }

    .note {
      margin-top: 30px;
      font-size: 14px;
      color: #777;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Deckifly Reading Study</h1>

    <p>
      You will be asked to read one of the following texts and use the Deckifly extension while reading.
      Please select the assigned text and follow the instructions provided.
    </p>

    <div class="buttons">
      <a class="button" href="text1.html">Start Text 1</a>
      <a class="button" href="text2.html">Start Text 2</a>
      <a class="button" href="text3.html">Start Text 3</a>
    </div>

    <div class="note">
      Please complete the task without switching between texts.
    </div>
  </div>
</body>
</html>
